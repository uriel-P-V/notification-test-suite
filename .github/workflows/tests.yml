name: Notification Test Suite

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=notifier --cov-report=term-missing

      - name: Check coverage threshold
        run: pytest tests/ --cov=notifier --cov-fail-under=80

      - name: Test summary
        if: failure()
        run: pytest tests/ -v --tb=long